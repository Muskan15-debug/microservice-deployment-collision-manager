version: "3.9"

services:
  user-service:
    build: ./User-Service
    container_name: user-service
    ports:
      - "5050:5050"

  order-service:
    build: ./Order-Service
    container_name: order-service
    ports:
      - "8000:8000"
    environment:
      - USER_SERVICE_URL=http://user-service:5050
    depends_on:
      - user-service

  contract-test:
    build: ./tests
    container_name: contract-test
    environment:
      - USER_SERVICE_URL=http://user-service:5050
    depends_on:
      - user-service